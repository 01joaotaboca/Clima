<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviômetro Online</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <style>
        :root { 
            --primary: #2e7d32; 
            --accent: #66bb6a; 
            --dark: #0a1a0a; 
            --card: #152a15; 
            --text: #e0e0e0; 
            --rain-blue: #add8e6; 
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0a1a0a; 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 20px; 
            overflow-x: hidden; 
        }
        
        header { 
            padding: 18px; 
            text-align: center; 
            background: rgba(0,0,0,0.8); 
            border-bottom: 3px solid var(--primary);
            position: sticky; top: 0; z-index: 100;
        }
        header h2 { margin: 0; font-size: 18px; letter-spacing: 2px; color: #fff; text-transform: uppercase; }

        .container { max-width: 600px; margin: auto; padding: 10px; display: none; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h3 { color: var(--accent); margin-top: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; border-left: 3px solid var(--primary); padding-left: 8px; margin-bottom: 15px; }
        
        .input-group { display: grid; grid-template-columns: 1.2fr 1fr; gap: 8px; margin-bottom: 10px; }
        input { background: #000; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; -webkit-appearance: none; }
        input:focus { border-color: var(--accent); }

        button.btn-main { 
            background: linear-gradient(to right, var(--primary), var(--accent)); 
            color: white; font-weight: bold; padding: 14px; border: none; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; transition: transform 0.1s; font-size: 14px;
        }
        button:active { transform: scale(0.98); opacity: 0.8; }
        
        .last-entry-card { 
            display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); 
            padding: 12px; border-radius: 8px; margin-top: 15px; border-left: 4px solid #ff5252; 
        }
        .btn-del { background: #ff5252; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 11px; }
        
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .stat-box small { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-box b { display: block; font-size: 20px; color: var(--accent); }
        
        .btn-group { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        .btn-group button { flex: 1; padding: 10px 5px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 10px; min-width: 80px; text-transform: uppercase; }
        .btn-export { background: #1976d2; color: white; }
        .btn-import { background: #388e3c; color: white; }
        .btn-clear { background: #d32f2f; color: white; }
        
        footer { text-align: center; font-size: 11px; opacity: 0.5; margin-top: 20px; padding-bottom: 20px; }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #0a1a0a, #000);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; transition: opacity 0.6s ease;
        }
        .rain-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .drop { position: absolute; background: var(--rain-blue); width: 2px; height: 15px; opacity: 0.4; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }
        
        .info-badge { background: rgba(102, 187, 106, 0.1); padding: 8px; border-radius: 5px; font-size: 11px; text-align: center; margin-top: 10px; color: #888; border: 1px dashed #333; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="rain-container" id="rainContainer"></div>
    <h1 style="letter-spacing: 4px; font-size: 24px; margin-bottom: 5px;">PLUVIÔMETRO</h1>
    <p style="color: var(--accent); font-size: 14px; margin-bottom: 20px;">João Divino Barbosa</p>
    <div style="width: 150px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden;">
        <div style="width: 100%; height: 100%; background: var(--accent); animation: fill-bar 1.5s forwards ease-in-out;"></div>
    </div>
</div>

<header><h2>PLUVIÔMETRO ONLINE</h2></header>

<div class="container" id="app-container">
    <div class="card">
        <h3>Novo Registro</h3>
        <div class="input-group">
            <input type="date" id="dataChuva">
            <input type="number" id="valorChuva" placeholder="Chuva mm" inputmode="decimal" step="0.1">
        </div>
        <button class="btn-main" onclick="lancar()">REGISTRAR AGORA</button>
        
        <div id="containerUltimo"></div>

        <div class="btn-group">
            <button class="btn-export" onclick="BancoSimples.exportar()">📥 Exportar</button>
            <button class="btn-import" onclick="importarDados()">📤 Importar</button>
            <button class="btn-clear" onclick="BancoSimples.limpar()">🗑️ Limpar</button>
        </div>
        <div class="info-badge" id="infoRegistros">📊 Total de registros: 0</div>
    </div>

    <div class="card">
        <h3>Evolução Diária (Picos)</h3>
        <div class="stats-row">
            <div class="stat-box"><small>Total Mês</small><b id="totalMes">0 mm</b></div>
            <div class="stat-box"><small>Maior Pico</small><b id="picoMes">0 mm</b></div>
        </div>
        <div style="height: 220px; position: relative;">
            <canvas id="chartMensalDiario"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>Acumulado Mensal</h3>
        <div style="height: 250px; position: relative;">
            <canvas id="chartAnual"></canvas>
        </div>
    </div>

    <footer>
        Pluviômetro Online &copy; 2026<br>
        Versão PWA Instalável<br>
        <b>João Divino Barbosa</b>
    </footer>
</div>

<script>
    // ==========================================
    // 1. CONFIGURAÇÃO PWA & SERVICE WORKER
    // ==========================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('PWA ativo com sucesso'))
            .catch(err => console.log('Erro ao registrar PWA', err));
        });
    }

    // ==========================================
    // 2. BANCO DE DADOS (LOCALSTORAGE)
    // ==========================================
    const BancoSimples = {
        nome: 'pluviometro_dados',
        salvar(dados) { localStorage.setItem(this.nome, JSON.stringify(dados)); },
        carregar() { 
            try {
                return JSON.parse(localStorage.getItem(this.nome)) || [];
            } catch(e) { return []; }
        },
        adicionar(registro) {
            const registros = this.carregar();
            registro.id = Date.now();
            registros.push(registro);
            registros.sort((a, b) => new Date(a.data) - new Date(b.data));
            this.salvar(registros);
        },
        buscarPorData(data) { return this.carregar().filter(r => r.data === data); },
        deletar(id) { 
            const novos = this.carregar().filter(r => r.id !== id);
            this.salvar(novos);
        },
        limpar() { 
            if(confirm("⚠️ Isso apagará TODOS os anos de registro! Confirmar?")) { 
                localStorage.removeItem(this.nome); 
                atualizarUI(); 
            } 
        },
        exportar() {
            const dados = this.carregar();
            if(dados.length === 0) return alert("Não há dados para exportar.");
            const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `chuva_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }
    };

    // ==========================================
    // 3. LÓGICA E GRÁFICOS
    // ==========================================
    let chartAnual, chartMensal;
    const nomesMeses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    function lancar() {
        const inputData = document.getElementById("dataChuva").value;
        const valor = parseFloat(document.getElementById("valorChuva").value);
        
        if(!inputData || isNaN(valor)) {
            alert("Por favor, informe a data e a quantidade de chuva.");
            return;
        }
        
        // Mantém a data local sem distorção de fuso
        const dataLocal = inputData; 

        const existe = BancoSimples.buscarPorData(dataLocal);
        if(existe.length > 0) {
            if(!confirm(`Já existe registro para esta data (${valor} mm). Deseja substituir?`)) return;
            BancoSimples.deletar(existe[0].id);
        }

        BancoSimples.adicionar({ data: dataLocal, valor: valor });
        document.getElementById("valorChuva").value = "";
        atualizarUI();
    }

    function excluirID(id) { 
        if(confirm("Excluir este registro?")) { 
            BancoSimples.deletar(id); 
            atualizarUI(); 
        } 
    }

    function atualizarUI() {
        const registros = BancoSimples.carregar();
        const agora = new Date();
        const mesAtual = agora.getMonth(); // 0-11
        const anoAtual = agora.getFullYear();
        
        document.getElementById("infoRegistros").innerText = `📊 Total de registros: ${registros.length}`;
        
        // Filtro do mês atual (Lógica robusta para strings de data AAAA-MM-DD)
        const registrosMes = registros.filter(r => {
            const partes = r.data.split('-');
            return parseInt(partes[1]) === (mesAtual + 1) && parseInt(partes[0]) === anoAtual;
        });

        let totalMes = 0, maiorPico = 0;
        const chuvasPorDia = {};
        
        registrosMes.forEach(r => {
            totalMes += r.valor;
            if(r.valor > maiorPico) maiorPico = r.valor;
            const dia = parseInt(r.data.split('-')[2]);
            chuvasPorDia[dia] = (chuvasPorDia[dia] || 0) + r.valor;
        });

        document.getElementById("totalMes").innerText = totalMes.toFixed(1) + " mm";
        document.getElementById("picoMes").innerText = maiorPico.toFixed(1) + " mm";

        // Último Lançamento
        const containerUltimo = document.getElementById("containerUltimo");
        if(registros.length > 0) {
            const u = registros[registros.length - 1];
            const dFmt = u.data.split('-').reverse().join('/');
            containerUltimo.innerHTML = `
                <div class="last-entry-card">
                    <span><b>Último:</b> ${dFmt} &rarr; ${u.valor} mm</span>
                    <button class="btn-del" onclick="excluirID(${u.id})">APAGAR</button>
                </div>`;
        } else { containerUltimo.innerHTML = ''; }

        // Gráfico Diário
        const diasNoMes = new Date(anoAtual, mesAtual + 1, 0).getDate();
        const labelsDias = Array.from({length: diasNoMes}, (_, i) => i + 1);
        const dadosDiarios = labelsDias.map(d => chuvasPorDia[d] || 0);

        // Gráfico Anual
        const totaisAnuais = new Array(12).fill(0);
        registros.forEach(r => {
            const d = r.data.split('-');
            if(parseInt(d[0]) === anoAtual) {
                totaisAnuais[parseInt(d[1])-1] += r.valor;
            }
        });

        renderizarGraficos(totaisAnuais, labelsDias, dadosDiarios);
    }

    function renderizarGraficos(dadosAnuais, labelsDias, dadosDiarios) {
        const globalOptions = { 
            responsive: true, 
            maintainAspectRatio: false, 
            plugins: { legend: false } 
        };

        // Gráfico Anual (Barras)
        if(chartAnual) chartAnual.destroy();
        chartAnual = new Chart(document.getElementById('chartAnual'), {
            type: 'bar',
            data: { 
                labels: nomesMeses, 
                datasets: [{ 
                    data: dadosAnuais, 
                    backgroundColor: '#2e7d32', 
                    borderRadius: 4,
                    barPercentage: 0.7
                }] 
            },
            options: { 
                ...globalOptions,
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#222' }, ticks: { color: '#888' } },
                    x: { ticks: { color: '#888' }, grid: { display: false } }
                } 
            }
        });

        // Gráfico Mensal (Linha)
        if(chartMensal) chartMensal.destroy();
        chartMensal = new Chart(document.getElementById('chartMensalDiario'), {
            type: 'line',
            data: { 
                labels: labelsDias, 
                datasets: [{ 
                    data: dadosDiarios, 
                    borderColor: '#66bb6a', 
                    backgroundColor: 'rgba(102,187,106,0.1)', 
                    fill: true, 
                    tension: 0.3, 
                    pointRadius: 2,
                    borderWidth: 2
                }] 
            },
            options: { 
                ...globalOptions, 
                layout: { padding: { top: 25 } },
                plugins: { 
                    legend: false,
                    datalabels: { 
                        align: 'top', 
                        color: '#fff', 
                        font: { size: 9, weight: 'bold' }, 
                        formatter: v => v > 0 ? v : '',
                        offset: 4
                    } 
                },
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#222' }, ticks: { display: false } },
                    x: { grid: { display: false }, ticks: { color: '#888', font: { size: 10 } } }
                } 
            },
            plugins: [ChartDataLabels]
        });
    }

    function importarDados() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const json = JSON.parse(ev.target.result);
                    if(Array.isArray(json)) {
                        localStorage.setItem(BancoSimples.nome, ev.target.result);
                        atualizarUI();
                        alert("Dados importados com sucesso!");
                    }
                } catch(e) { alert("Arquivo inválido!"); }
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    function createRain() {
        const container = document.getElementById('rainContainer');
        for (let i = 0; i < 40; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(drop);
        }
    }

    // Inicialização ao carregar
    window.addEventListener('load', () => {
        createRain();
        // Coloca a data de hoje por padrão
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('dataChuva').value = hoje;

        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                atualizarUI();
            }, 600);
        }, 2000);
    });
</script>

</body>
</html>
