<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviômetro Online</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #66bb6a;
            --dark: #0a1a0a;
            --card: #152a15;
            --text: #e0e0e0;
            --rain-blue: #add8e6;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #0a1a0a; color: var(--text); margin: 0; padding-bottom: 20px; overflow-x: hidden; }
        header { padding: 18px; text-align: center; background: rgba(0,0,0,0.6); border-bottom: 3px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        header h2 { margin: 0; font-size: 20px; letter-spacing: 2px; color: #fff; text-transform: uppercase; }
        .container { max-width: 600px; margin: auto; padding: 10px; display: none; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        h3 { color: var(--accent); margin-top: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { display: grid; grid-template-columns: 1.2fr 1fr; gap: 8px; margin-bottom: 10px; }
        input[type="date"], input[type="number"], input[type="text"], input[type="password"] {
            background: #000; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box;
        }
        button.btn-main { background: linear-gradient(to right, var(--primary), var(--accent)); color: white; font-weight: bold; padding: 14px; border: none; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; font-size: 15px; }
        .last-entry-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #ff5252; }
        .btn-del { background: #ff5252; color: white; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .stat-box small { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-box b { display: block; font-size: 18px; color: var(--accent); }
        .mes-labels { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; font-size: 9px; text-align: center; }
        .mes-box { background: rgba(0,0,0,0.3); padding: 6px 4px; border-radius: 4px; border: 1px solid #222; }
        .mes-nome { font-weight: bold; color: var(--accent); font-size: 10px; margin-bottom: 3px; }
        .mes-valor { font-size: 11px; font-weight: bold; color: #fff; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-group button { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 10px; }
        .btn-export { background: #2196f3; color: white; }
        .btn-import { background: #4caf50; color: white; }
        .btn-clear { background: #f44336; color: white; }
        footer { text-align: center; font-size: 11px; opacity: 0.5; margin-top: 20px; padding: 20px; }

        /* SPLASH */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #0a1a0a, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; text-align: center; transition: opacity 0.8s ease; }
        #splash-screen h1 { font-size: 26px; color: #fff; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        .loader-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); margin-top: 25px; border-radius: 10px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: var(--accent); animation: fill-bar 2.5s forwards ease-in-out; }
        @keyframes fill-bar { to { width: 100%; } }

        /* CONFIG SUPABASE */
        #config-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a1a0a; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 8888; padding: 20px; box-sizing: border-box; }
        .config-card { background: var(--card); border-radius: 16px; padding: 25px; width: 100%; max-width: 420px; border: 1px solid #2e7d32; overflow-y: auto; max-height: 90vh; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .dot-ok { background: #66bb6a; }
        .dot-err { background: #ff5252; }
        .dot-wait { background: #ffb300; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 40px; background: rgba(46,125,50,0.9); color: white; font-size: 13px; text-align: center; line-height: 40px; z-index: 7777; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingBar">⏳ Sincronizando...</div>

<div id="splash-screen">
    <h1>Pluviômetro Online</h1>
    <p>Desenvolvido por João Divino Barbosa</p>
    <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div id="config-screen">
    <div class="config-card">
        <h2 style="color:var(--accent); text-align:center;">☁️ Configurar Nuvem</h2>
        <input type="text" id="cfgUrl" placeholder="URL do Supabase">
        <input type="password" id="cfgKey" placeholder="Chave anon/public key">
        <input type="text" id="cfgTabela" placeholder="Nome da tabela" value="chuvas">
        <button class="btn-main" onclick="salvarConfig()">CONECTAR E SALVAR</button>
        <div id="statusConexao" style="font-size:12px; margin-top:10px; text-align:center;"></div>
    </div>
</div>

<header><h2>PLUVIÔMETRO</h2></header>

<div class="container" id="app-container">
    <div class="card">
        <h3>Novo Registro <button style="float:right; background:transparent; border:1px solid #444; color:#888; border-radius:4px; font-size:10px; cursor:pointer;" onclick="mostrarConfig()">⚙️</button></h3>
        <div class="input-group">
            <input type="date" id="dataChuva">
            <input type="number" id="valorChuva" placeholder="mm" step="0.1">
        </div>
        <button class="btn-main" onclick="lancar()">REGISTRAR</button>
        <div id="containerUltimo"></div>
        <div class="btn-group">
            <button class="btn-export" onclick="exportarDados()">📥 EXPORTAR</button>
            <button class="btn-import" onclick="importarDados()">📤 IMPORTAR</button>
            <button class="btn-clear" onclick="limparTudo()">🗑️ LIMPAR</button>
        </div>
        <div id="infoRegistros" style="font-size:10px; text-align:center; margin-top:10px; opacity:0.6;"></div>
    </div>

    <div class="card">
        <h3>Picos do Mês</h3>
        <div class="stats-row">
            <div class="stat-box"><small>Total Mês</small><b id="totalMes">0 mm</b></div>
            <div class="stat-box"><small>Maior Pico</small><b id="picoMes">0 mm</b></div>
        </div>
        <div style="height: 180px;"><canvas id="chartMensalDiario"></canvas></div>
    </div>

    <div class="card">
        <h3>Acumulado Mensal</h3>
        <div style="height: 180px;"><canvas id="chartAnual"></canvas></div>
        <div id="labelsFechamento" class="mes-labels"></div>
    </div>

    <footer>Pluviômetro Online &copy; 2026<br>João Divino Barbosa</footer>
</div>

<script>
const CONFIG_KEY = 'pluviometro_supabase_config';
let supabaseClient = null;
let tabelaNome = 'chuvas';
let chartAnual, chartMensal;
const nomesMeses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function carregarConfig() {
    const cfg = localStorage.getItem(CONFIG_KEY);
    return cfg ? JSON.parse(cfg) : null;
}

function inicializarSupabase(url, key, tabela) {
    try {
        supabaseClient = supabase.createClient(url, key);
        tabelaNome = tabela || 'chuvas';
        return true;
    } catch(e) { return false; }
}

async function salvarConfig() {
    const url = document.getElementById('cfgUrl').value.trim();
    const key = document.getElementById('cfgKey').value.trim();
    const tabela = document.getElementById('cfgTabela').value.trim() || 'chuvas';
    const status = document.getElementById('statusConexao');

    status.innerHTML = '<span class="status-dot dot-wait"></span>Testando...';
    
    if(inicializarSupabase(url, key, tabela)) {
        const { error } = await supabaseClient.from(tabela).select('id').limit(1);
        if(!error) {
            localStorage.setItem(CONFIG_KEY, JSON.stringify({url, key, tabela}));
            status.innerHTML = '<span class="status-dot dot-ok"></span>Sucesso!';
            setTimeout(() => {
                document.getElementById('config-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                atualizarUI();
            }, 1000);
        } else {
            status.innerHTML = '<span class="status-dot dot-err"></span>Erro na Tabela';
        }
    }
}

function mostrarConfig() {
    const cfg = carregarConfig();
    if(cfg) {
        document.getElementById('cfgUrl').value = cfg.url;
        document.getElementById('cfgKey').value = cfg.key;
        document.getElementById('cfgTabela').value = cfg.tabela;
    }
    document.getElementById('config-screen').style.display = 'flex';
    document.getElementById('app-container').style.display = 'none';
}

function mostrarLoading(show) {
    document.getElementById('loadingBar').style.display = show ? 'block' : 'none';
}

async function lancar() {
    const data = document.getElementById("dataChuva").value;
    const valor = parseFloat(document.getElementById("valorChuva").value);
    if(!data || isNaN(valor)) return alert("Dados inválidos");

    mostrarLoading(true);
    await supabaseClient.from(tabelaNome).insert([{ data, valor }]);
    document.getElementById("valorChuva").value = "";
    await atualizarUI();
}

async function atualizarUI() {
    mostrarLoading(true);
    const { data: registros } = await supabaseClient.from(tabelaNome).select('*').order('data', { ascending: true });
    mostrarLoading(false);

    if(!registros) return;

    document.getElementById("infoRegistros").innerText = `☁️ ${registros.length} registros sincronizados`;

    const agora = new Date();
    const mesAtual = agora.getMonth();
    const anoAtual = agora.getFullYear();

    // Cálculos
    let totalMes = 0, maiorPico = 0;
    const chuvasPorDia = {};
    const acumuladoMeses = new Array(12).fill(0);

    registros.forEach(r => {
        const d = new Date(r.data + 'T12:00:00');
        if(d.getFullYear() === anoAtual) {
            acumuladoMeses[d.getMonth()] += parseFloat(r.valor);
            if(d.getMonth() === mesAtual) {
                totalMes += parseFloat(r.valor);
                if(r.valor > maiorPico) maiorPico = r.valor;
                chuvasPorDia[d.getDate()] = (chuvasPorDia[d.getDate()] || 0) + r.valor;
            }
        }
    });

    document.getElementById("totalMes").innerText = totalMes.toFixed(1) + " mm";
    document.getElementById("picoMes").innerText = maiorPico.toFixed(1) + " mm";

    // Gráfico Mensal (Dias)
    const ultimoDia = new Date(anoAtual, mesAtual + 1, 0).getDate();
    const labelsDias = Array.from({length: ultimoDia}, (_, i) => i + 1);
    const dadosDias = labelsDias.map(d => chuvasPorDia[d] || 0);

    if(chartMensal) chartMensal.destroy();
    chartMensal = new Chart(document.getElementById('chartMensalDiario'), {
        type: 'bar',
        data: { labels: labelsDias, datasets: [{ data: dadosDias, backgroundColor: '#66bb6a' }] },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    // Gráfico Anual
    if(chartAnual) chartAnual.destroy();
    chartAnual = new Chart(document.getElementById('chartAnual'), {
        type: 'line',
        data: { labels: nomesMeses, datasets: [{ data: acumuladoMeses, borderColor: '#2e7d32', fill: true, backgroundColor: 'rgba(46,125,50,0.1)' }] },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    document.getElementById('labelsFechamento').innerHTML = nomesMeses.map((m, i) => `
        <div class="mes-box"><div class="mes-nome">${m}</div><div class="mes-valor">${acumuladoMeses[i].toFixed(0)}</div></div>
    `).join('');
}

// Funções de suporte
async function exportarDados() {
    const { data } = await supabaseClient.from(tabelaNome).select('*');
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'pluviometro_backup.json'; a.click();
}

async function limparTudo() {
    if(confirm("Apagar TUDO na nuvem?")) {
        await supabaseClient.from(tabelaNome).delete().neq('id', 0);
        atualizarUI();
    }
}

window.onload = async () => {
    setTimeout(() => { 
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
    }, 2500);

    const cfg = carregarConfig();
    if(cfg && inicializarSupabase(cfg.url, cfg.key, cfg.tabela)) {
        document.getElementById('app-container').style.display = 'block';
        atualizarUI();
    } else {
        document.getElementById('config-screen').style.display = 'flex';
    }
};
</script>
</body>
    </html>
