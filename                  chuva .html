<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviômetro Online</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root { 
            --primary: #2e7d32; 
            --accent: #66bb6a; 
            --dark: #0a1a0a; 
            --card: #152a15; 
            --text: #e0e0e0; 
            --rain-blue: #add8e6; 
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0a1a0a; 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 20px; 
            overflow: hidden; 
        }
        
        header { 
            padding: 18px; 
            text-align: center; 
            background: rgba(0,0,0,0.6); 
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        header h2 { margin: 0; font-size: 20px; letter-spacing: 2px; color: #fff; text-transform: uppercase; }

        .container { max-width: 600px; margin: auto; padding: 10px; display: none; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        h3 { color: var(--accent); margin-top: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-group { display: grid; grid-template-columns: 1.2fr 1fr; gap: 8px; margin-bottom: 10px; }
        input { background: #000; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        button.btn-main { 
            background: linear-gradient(to right, var(--primary), var(--accent)); 
            color: white; font-weight: bold; padding: 14px; border: none; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; 
        }
        
        .last-entry-card { 
            display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); 
            padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #ff5252; 
        }
        .btn-del { background: #ff5252; color: white; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }
        
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .stat-box small { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-box b { display: block; font-size: 18px; color: var(--accent); }
        
        .mes-labels { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 4px; 
            margin-top: 10px; 
            font-size: 9px; 
            text-align: center;
        }
        .mes-box { 
            background: rgba(0,0,0,0.3); 
            padding: 6px 4px; 
            border-radius: 4px; 
            border: 1px solid #222;
            transition: all 0.2s;
        }
        .mes-box:hover {
            background: rgba(102, 187, 106, 0.2);
            transform: translateY(-2px);
        }
        .mes-nome {
            font-weight: bold;
            color: var(--accent);
            font-size: 10px;
            margin-bottom: 3px;
        }
        .mes-valor {
            font-size: 11px;
            font-weight: bold;
            color: #fff;
        }
        .mes-valor small {
            font-size: 8px;
            color: #888;
        }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-group button { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-export { background: #2196f3; color: white; }
        .btn-import { background: #4caf50; color: white; }
        .btn-clear { background: #f44336; color: white; }
        
        footer { text-align: center; font-size: 11px; opacity: 0.5; margin-top: 10px; }

        /* SPLASH SCREEN COM CHUVA AZUL */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #0a1a0a, #000);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; text-align: center;
            transition: opacity 0.8s ease; overflow: hidden;
        }
        .rain-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .drop { position: absolute; background: var(--rain-blue); width: 2px; height: 15px; opacity: 0.5; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }
        
        #splash-screen h1 { font-size: 26px; color: #fff; margin: 0; text-transform: uppercase; letter-spacing: 3px; z-index: 10; }
        #splash-screen p { font-size: 14px; color: var(--accent); margin-top: 8px; z-index: 10; }
        .loader-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); margin-top: 25px; border-radius: 10px; overflow: hidden; z-index: 10; }
        .loader-fill { width: 0%; height: 100%; background: var(--accent); animation: fill-bar 2s forwards ease-in-out; }
        @keyframes fill-bar { to { width: 100%; } }
        
        .info-badge {
            background: rgba(102, 187, 106, 0.2);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            text-align: center;
            margin-top: 10px;
        }
        
        .chart-container {
            position: relative;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="rain-container" id="rainContainer"></div>
    <h1>Pluviômetro Online</h1>
    <p>Desenvolvido por João Divino Barbosa</p>
    <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<header><h2>PLUVIÔMETRO ONLINE</h2></header>

<div class="container" id="app-container">
    <div class="card">
        <h3>Novo Registro</h3>
        <div class="input-group">
            <input type="date" id="dataChuva">
            <input type="number" id="valorChuva" placeholder="Chuva mm" inputmode="decimal" step="0.1">
        </div>
        <button class="btn-main" onclick="lancar()">REGISTRAR AGORA</button>
        <div class="btn-group">
            <button class="btn-export" onclick="exportarDados()">📥 EXPORTAR</button>
            <button class="btn-import" onclick="importarDados()">📤 IMPORTAR</button>
            <button class="btn-clear" onclick="limparTudo()">🗑️ LIMPAR TUDO</button>
        </div>
        <div id="containerUltimo"></div>
        <div class="info-badge" id="infoRegistros"></div>
    </div>

    <div class="card">
        <h3>Evolução Diária (Picos)</h3>
        <div class="stats-row">
            <div class="stat-box"><small>Total Mês</small><b id="totalMes">0 mm</b></div>
            <div class="stat-box"><small>Maior Pico</small><b id="picoMes">0 mm</b></div>
        </div>
        <div style="height: 220px;"><canvas id="chartMensalDiario"></canvas></div>
    </div>

    <div class="card">
        <h3>Acumulado Mensal</h3>
        <div class="chart-container">
            <canvas id="chartAnual"></canvas>
        </div>
        <div id="labelsFechamento" class="mes-labels"></div>
    </div>

    <footer>Pluviômetro Online &copy; 2026<br>João Divino Barbosa</footer>
</div>

<script>
    // ========== BANCO DE DADOS SIMPLES ==========
    const BancoSimples = {
        nome: 'pluviometro_dados',
        
        // Salvar dados
        salvar(dados) {
            localStorage.setItem(this.nome, JSON.stringify(dados));
        },
        
        // Carregar dados
        carregar() {
            const dados = localStorage.getItem(this.nome);
            return dados ? JSON.parse(dados) : [];
        },
        
        // Adicionar um registro
        adicionar(registro) {
            const registros = this.carregar();
            registro.id = Date.now();
            registro.data_criacao = new Date().toISOString();
            registros.push(registro);
            // Ordenar por data
            registros.sort((a, b) => new Date(a.data) - new Date(b.data));
            this.salvar(registros);
            return registro;
        },
        
        // Listar todos
        listar() {
            return this.carregar();
        },
        
        // Buscar por data
        buscarPorData(data) {
            const registros = this.carregar();
            return registros.filter(r => r.data === data);
        },
        
        // Deletar registro
        deletar(id) {
            const registros = this.carregar();
            const novos = registros.filter(r => r.id !== id);
            this.salvar(novos);
            return novos;
        },
        
        // Limpar todos os dados
        limpar() {
            if(confirm("⚠️ ATENÇÃO: Isso vai apagar TODOS os dados! Confirmar?")) {
                localStorage.removeItem(this.nome);
                atualizarUI();
                alert("Todos os dados foram removidos!");
                return true;
            }
            return false;
        },
        
        // Exportar dados
        exportar() {
            const dados = this.carregar();
            if(dados.length === 0) {
                alert("Não há dados para exportar!");
                return;
            }
            const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pluviometro_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert("Dados exportados com sucesso!");
        },
        
        // Importar dados
        importar(arquivo) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const dados = JSON.parse(e.target.result);
                        if(Array.isArray(dados)) {
                            this.salvar(dados);
                            resolve(dados);
                        } else {
                            reject(new Error("Formato inválido"));
                        }
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsText(arquivo);
            });
        }
    };

    // ========== VARIÁVEIS GLOBAIS ==========
    let chartAnual, chartMensal;
    const nomesMeses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    
    // ========== FUNÇÕES PRINCIPAIS ==========
    function lancar() {
        const data = document.getElementById("dataChuva").value;
        const valor = parseFloat(document.getElementById("valorChuva").value);
        
        if(!data || isNaN(valor)) {
            alert("Preencha data e valor corretamente!");
            return;
        }
        
        if(valor < 0) {
            alert("O valor da chuva não pode ser negativo!");
            return;
        }
        
        // Verificar se já existe registro para esta data
        const existe = BancoSimples.buscarPorData(data);
        if(existe.length > 0) {
            if(confirm(`Já existe registro para ${new Date(data).toLocaleDateString('pt-BR')} com ${existe[0].valor} mm. Deseja substituir?`)) {
                BancoSimples.deletar(existe[0].id);
            } else {
                return;
            }
        }
        
        // Adicionar novo registro
        BancoSimples.adicionar({
            data: data,
            valor: valor
        });
        
        document.getElementById("valorChuva").value = "";
        document.getElementById("dataChuva").value = "";
        atualizarUI();
    }

    function excluirUltimo() {
        const registros = BancoSimples.listar();
        if(registros.length > 0) {
            if(confirm("Apagar o último lançamento?")) {
                const ultimo = registros[registros.length - 1];
                BancoSimples.deletar(ultimo.id);
                atualizarUI();
            }
        }
    }
    
    function exportarDados() {
        BancoSimples.exportar();
    }
    
    function importarDados() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = async (e) => {
            const arquivo = e.target.files[0];
            if(arquivo) {
                try {
                    await BancoSimples.importar(arquivo);
                    alert("Dados importados com sucesso!");
                    atualizarUI();
                } catch(error) {
                    alert("Erro ao importar: Arquivo inválido!");
                }
            }
        };
        input.click();
    }
    
    function limparTudo() {
        BancoSimples.limpar();
    }

    function atualizarUI() {
        const registros = BancoSimples.listar();
        const agora = new Date();
        const mesAtual = agora.getMonth();
        const anoAtual = agora.getFullYear();
        
        // Atualizar contador de registros
        document.getElementById("infoRegistros").innerHTML = `📊 Total de registros: ${registros.length}`;
        
        // Filtra registros do mês atual
        const registrosMes = registros.filter(r => {
            const data = new Date(r.data);
            return data.getMonth() === mesAtual && data.getFullYear() === anoAtual;
        });
        
        // Calcula totais
        let totalMes = 0;
        let maiorPico = 0;
        const chuvasPorDia = {};
        
        registrosMes.forEach(r => {
            const dia = new Date(r.data).getDate();
            totalMes += r.valor;
            if(r.valor > maiorPico) maiorPico = r.valor;
            chuvasPorDia[dia] = (chuvasPorDia[dia] || 0) + r.valor;
        });
        
        // Atualiza estatísticas na tela
        document.getElementById("totalMes").innerText = totalMes.toFixed(1) + " mm";
        document.getElementById("picoMes").innerText = maiorPico.toFixed(1) + " mm";
        
        // Mostra último registro
        const containerUltimo = document.getElementById("containerUltimo");
        if(registros.length > 0) {
            const ultimo = registros[registros.length - 1];
            const dataFmt = new Date(ultimo.data).toLocaleDateString('pt-BR');
            containerUltimo.innerHTML = `
                <div class="last-entry-card">
                    <span><b>Último:</b> ${dataFmt} - ${ultimo.valor} mm</span>
                    <button class="btn-del" onclick="excluirUltimo()">APAGAR</button>
                </div>
            `;
        } else {
            containerUltimo.innerHTML = '';
        }
        
        // Prepara dados do gráfico diário
        const ultimoDiaMes = new Date(anoAtual, mesAtual + 1, 0).getDate();
        const labelsDias = [];
        const chuvasDoMes = [];
        
        for(let dia = 1; dia <= ultimoDiaMes; dia++) {
            labelsDias.push(dia);
            chuvasDoMes.push(chuvasPorDia[dia] || 0);
        }
        
        // Totais por mês (para gráfico anual)
        const totaisMeses = new Array(12).fill(0);
        registros.forEach(r => {
            const data = new Date(r.data);
            if(data.getFullYear() === anoAtual) {
                totaisMeses[data.getMonth()] += r.valor;
            }
        });
        
        renderizarGraficos(totaisMeses, labelsDias, chuvasDoMes);
        
        // Atualizar os valores mensais abaixo do gráfico
        atualizarLabelsMensais(totaisMeses);
    }

    function atualizarLabelsMensais(totaisMeses) {
        const container = document.getElementById("labelsFechamento");
        let html = '';
        
        for(let i = 0; i < nomesMeses.length; i++) {
            const valor = totaisMeses[i];
            const valorFormatado = valor > 0 ? valor.toFixed(1) : '0';
            const corDestaque = valor > 0 ? '#66bb6a' : '#888';
            
            html += `
                <div class="mes-box">
                    <div class="mes-nome">${nomesMeses[i]}</div>
                    <div class="mes-valor" style="color: ${corDestaque}">
                        ${valorFormatado}<small>mm</small>
                    </div>
                </div>
            `;
        }
        
        container.innerHTML = html;
    }

    function renderizarGraficos(dadosAnuais, labelsDias, dadosDiarios) {
        // Gráfico Anual com Datalabels configurados para mostrar valores
        if(chartAnual) chartAnual.destroy();
        const ctxAnual = document.getElementById('chartAnual').getContext('2d');
        
        Chart.register(ChartDataLabels);
        chartAnual = new Chart(ctxAnual, {
            type: 'bar',
            data: { 
                labels: nomesMeses, 
                datasets: [{ 
                    data: dadosAnuais, 
                    backgroundColor: '#2e7d32',
                    borderRadius: 5,
                    borderColor: '#66bb6a',
                    borderWidth: 1
                }] 
            },
            options: { 
                responsive: true,
                maintainAspectRatio: true,
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.parsed.y.toFixed(1) + ' mm';
                            }
                        }
                    },
                    datalabels: { 
                        display: true,
                        align: 'top',
                        anchor: 'end',
                        color: '#fff',
                        backgroundColor: 'rgba(0,0,0,0.6)',
                        borderRadius: 4,
                        padding: {
                            left: 4,
                            right: 4,
                            top: 2,
                            bottom: 2
                        },
                        font: { 
                            weight: 'bold', 
                            size: 11 
                        },
                        formatter: (value, context) => {
                            if(value > 0) {
                                return value.toFixed(1) + 'mm';
                            }
                            return '';
                        }
                    } 
                }, 
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        grid: { color: '#222' },
                        title: { 
                            display: true, 
                            text: 'Precipitação (mm)', 
                            color: '#888',
                            font: { size: 11 }
                        },
                        ticks: {
                            callback: function(value) {
                                return value + 'mm';
                            }
                        }
                    },
                    x: {
                        grid: { display: false },
                        ticks: {
                            color: '#888',
                            font: { size: 10 }
                        }
                    }
                },
                layout: {
                    padding: {
                        top: 20,
                        bottom: 10
                    }
                }
            }
        });

        // Gráfico Mensal Diário
        if(chartMensal) chartMensal.destroy();
        const ctxMensal = document.getElementById('chartMensalDiario').getContext('2d');
        chartMensal = new Chart(ctxMensal, {
            type: 'line',
            data: { 
                labels: labelsDias, 
                datasets: [{ 
                    data: dadosDiarios, 
                    borderColor: '#66bb6a', 
                    backgroundColor: 'rgba(102, 187, 106, 0.2)', 
                    fill: true, 
                    tension: 0.4, 
                    pointRadius: 4, 
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#66bb6a',
                    pointHoverRadius: 6
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.parsed.y.toFixed(1) + ' mm';
                            }
                        }
                    },
                    datalabels: { 
                        align: 'top', 
                        anchor: 'end', 
                        color: '#fff', 
                        backgroundColor: 'rgba(0,0,0,0.5)',
                        borderRadius: 3,
                        padding: 2,
                        font: { weight: 'bold', size: 9 }, 
                        formatter: (val) => val > 0 ? val.toFixed(1) + '' : '' 
                    } 
                }, 
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        grid: { color: '#222' },
                        title: { 
                            display: true, 
                            text: 'mm', 
                            color: '#888' 
                        },
                        ticks: {
                            callback: function(value) {
                                return value + 'mm';
                            }
                        }
                    }, 
                    x: { 
                        grid: { display: false },
                        title: { 
                            display: true, 
                            text: 'Dias do mês', 
                            color: '#888' 
                        },
                        ticks: {
                            stepSize: 5,
                            color: '#888'
                        }
                    } 
                } 
            }
        });
    }

    // Gerador de Chuva Azul para Splash
    function createRain() {
        const container = document.getElementById('rainContainer');
        for (let i = 0; i < 70; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(drop);
        }
    }

    // Inicialização
    window.addEventListener('load', () => {
        createRain();
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.body.style.overflow = 'auto';
                atualizarUI();
            }, 800);
        }, 2200);
    });
</script>
</body>
</html>
